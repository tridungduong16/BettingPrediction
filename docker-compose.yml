name: futbolia

services:
  backend:
    build:
      context: ./backend
    image: futbolia-backend:latest
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8082,http://127.0.0.1:8082}
      WORLDCUP_DATA_DIR: /app/data
      LIVE_EVENTS_FIXTURE_MAP_FILE: /app/data/live_fixture_map.json
      REDIS_HOST: ${REDIS_HOST:-incept_arena-redis-1}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      PREDICTION_CACHE_TTL_SECONDS: ${PREDICTION_CACHE_TTL_SECONDS:-21600}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - incept_arena_default
    volumes:
      - futbolia-backend-data:/app/data
    ports:
      - "${FUTBOLIA_BACKEND_BIND:-127.0.0.1}:${FUTBOLIA_BACKEND_PORT:-8010}:8000"

  web:
    build:
      context: ./frontend
      args:
        VITE_APP_ENV: production
        VITE_API_URL: ""
        VITE_WS_URL: ""
        VITE_PUBLIC_STATICS_URL: ""
        VITE_MATCH_ID: ${VITE_MATCH_ID:-2026-001-mexico-vs-south-africa}
        VITE_LIVE_DEBUG_LOGS: ${VITE_LIVE_DEBUG_LOGS:-false}
        VITE_LIVE_POLLING_INTERVAL_MS: ${VITE_LIVE_POLLING_INTERVAL_MS:-300000}
    image: futbolia-web:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FUTBOLIA_WEB_PORT:-8082}:80"

volumes:
  futbolia-backend-data:

networks:
  incept_arena_default:
    external: true
